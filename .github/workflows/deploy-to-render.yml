name: Deploy to Render

on:
  push:
    branches: [ main ]

jobs:
  trigger-deploy:
    name: Deploy to Render

    on:
      push:
        branches: [ main ]

    jobs:
      trigger-deploy:
        name: Trigger Render Deploy
        runs-on: ubuntu-latest
        steps:
          - name: Install jq
            run: sudo apt-get update && sudo apt-get install -y jq curl

          - name: Trigger Render deploy via API
            id: trigger
            env:
              RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
              RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
            run: |
              set -euo pipefail
              if [ -z "${RENDER_SERVICE_ID:-}" ] || [ -z "${RENDER_API_KEY:-}" ]; then
                echo "Missing Render secrets. Please set RENDER_SERVICE_ID and RENDER_API_KEY in repository secrets."
                exit 1
              fi
              echo "Triggering deploy for Render service: $RENDER_SERVICE_ID"
              RESPONSE=$(curl -s -X POST "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
                -H "Authorization: Bearer $RENDER_API_KEY" \
                -H "Content-Type: application/json" \
                -d '{"clearCache":true}')
              echo "Render response: $RESPONSE"
              DEPLOY_ID=$(echo "$RESPONSE" | jq -r '.id // empty')
              if [ -z "$DEPLOY_ID" ]; then
                echo "Failed to trigger deploy (no deploy id). Response: $RESPONSE"
                exit 1
              fi
              echo "deploy_id=$DEPLOY_ID" >> $GITHUB_OUTPUT

          - name: Poll Render deploy status
            id: poll
            env:
              RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
              RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
              DEPLOY_ID: ${{ steps.trigger.outputs.deploy_id }}
            run: |
              set -euo pipefail
              if [ -z "${RENDER_SERVICE_ID:-}" ] || [ -z "${RENDER_API_KEY:-}" ] || [ -z "${DEPLOY_ID:-}" ]; then
                echo "Missing env for polling"
                exit 1
              fi
              echo "Polling deploy status for: $DEPLOY_ID"
              MAX_ITER=30
              SLEEP=10
              i=0
              STATUS=""
              while [ $i -lt $MAX_ITER ]; do
                RESP=$(curl -s -H "Authorization: Bearer $RENDER_API_KEY" "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys/$DEPLOY_ID")
                echo "resp: $RESP"
                STATUS=$(echo "$RESP" | jq -r '.status // .state // empty')
                if [ -z "$STATUS" ]; then
                  # try other possible fields
                  STATUS=$(echo "$RESP" | jq -r '.result // empty')
                fi
                echo "Status: $STATUS"
                case "$STATUS" in
                  success|succeeded|successful)
                    echo "deploy_status=success" >> $GITHUB_OUTPUT
                    exit 0
                    ;;
                  failed|error|failure)
                    echo "deploy_status=failed" >> $GITHUB_OUTPUT
                    exit 1
                    ;;
                esac
                i=$((i+1))
                sleep $SLEEP
              done
              echo "deploy_status=timeout" >> $GITHUB_OUTPUT
              echo "Timed out waiting for Render deploy" >&2
              exit 1

          - name: Notify Slack (optional)
            if: always()
            env:
              SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
              RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
              DEPLOY_ID: ${{ steps.trigger.outputs.deploy_id }}
            run: |
              set -euo pipefail
              if [ -z "${SLACK_WEBHOOK:-}" ]; then
                echo "No Slack webhook provided; skipping Slack notification"
                exit 0
              fi
              STATUS=${{ steps.poll.outputs.deploy_status }} || STATUS="unknown"
              TEXT="Render deploy for service $RENDER_SERVICE_ID (deploy $DEPLOY_ID) finished with status: $STATUS"
              PAYLOAD=$(jq -n --arg t "$TEXT" '{text: $t}')
              curl -s -X POST -H 'Content-type: application/json' --data "$PAYLOAD" "$SLACK_WEBHOOK" || true

          - name: Notify Discord (optional)
            if: always()
            env:
              DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
              RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
              DEPLOY_ID: ${{ steps.trigger.outputs.deploy_id }}
            run: |
              set -euo pipefail
              if [ -z "${DISCORD_WEBHOOK:-}" ]; then
                echo "No Discord webhook provided; skipping Discord notification"
                exit 0
              fi
              STATUS=${{ steps.poll.outputs.deploy_status }} || STATUS="unknown"
              CONTENT="Render deploy for service $RENDER_SERVICE_ID (deploy $DEPLOY_ID) finished with status: $STATUS"
              curl -s -H "Content-Type: application/json" -X POST -d "{\"content\": \"$CONTENT\"}" $DISCORD_WEBHOOK || true